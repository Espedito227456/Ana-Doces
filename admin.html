<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin - Ana Doces</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #111;
    color: #fff;
    font-family: Arial;
}

.card {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 15px;
}

.topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
</style>
</head>

<body class="p-3">

<!-- 🔐 PROTEÇÃO -->
<script>
if (localStorage.getItem("adminLogado") !== "true") {
    window.location.href = "admin-login.html";
}
</script>

<div class="topo mb-3">
    <h3>📊 Painel Admin</h3>
    <button onclick="logout()" class="btn btn-danger">Sair</button>
</div>

<h5>Pedidos em tempo real</h5>

<div id="pedidos" class="mt-3">
    Carregando pedidos...
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

// 🔥 SUA CONFIG FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyB2ncY9pje6k2vjPlpTa1qL326h7NZGIJk",
    authDomain: "ana-doces-app.firebaseapp.com",
    projectId: "ana-doces-app",
    storageBucket: "ana-doces-app.firebasestorage.app",
    messagingSenderId: "563319843881",
    appId: "1:563319843881:web:9a4b884fef9f4a6f9e4038",
    measurementId: "G-DF09ZF8KH3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const pedidosRef = collection(db, "pedidos");
const pedidosDiv = document.getElementById("pedidos");

// 🔥 TEMPO REAL
const q = query(pedidosRef, orderBy("criadoEm", "desc"));

onSnapshot(q, (snapshot) => {

    pedidosDiv.innerHTML = "";

    if (snapshot.empty) {
        pedidosDiv.innerHTML = "Nenhum pedido ainda...";
        return;
    }

    snapshot.forEach(doc => {
        const p = doc.data();

        pedidosDiv.innerHTML += `
            <div class="card mb-2">
                <strong>👤 ${p.nome}</strong><br>
                🧾 ${p.itens.join("<br>")}<br>
                💰 <b>R$ ${p.total}</b>
            </div>
        `;
    });

});
</script>

<script>
function logout() {
    localStorage.removeItem("adminLogado");
    window.location.href = "admin-login.html";
}
</script>

</body>
</html>
